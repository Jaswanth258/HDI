<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDI Prediction System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">HDI Predictor</a>
            <a href="/predict" class="btn btn-light">Predict</a>
        </div>
    </nav>
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1>Human Development Index</h1>
            <p class="lead text-muted">Predict the HDI score using machine learning</p>
        </div>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card shadow h-100">
                    <div class="card-body text-center">
                        <h5 class="card-title">Long &amp; Healthy Life</h5>
                        <p class="card-text">Measured by life expectancy at birth</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow h-100">
                    <div class="card-body text-center">
                        <h5 class="card-title">Knowledge</h5>
                        <p class="card-text">Expected and mean years of schooling</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow h-100">
                    <div class="card-body text-center">
                        <h5 class="card-title">Standard of Living</h5>
                        <p class="card-text">Gross national income per capita</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="text-center mt-4">
            <a href="/predict" class="btn btn-primary btn-lg">Make a Prediction</a>
        </div>
    </div>
</body>
</html>
